version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: cactus-db
    environment:
      POSTGRES_USER: cactus_user
      POSTGRES_PASSWORD: cactus_password
      POSTGRES_DB: cactus_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
